substitutions:
  _REGION: us-central1
  _REPOSITORY: imciflow
  _SERVICE: imciflow-backend
  _IMAGE: backend

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --execution-environment
      - gen2
      - --allow-unauthenticated
      - --ingress
      - all
      - --port
      - "8080"
      - --memory
      - 2Gi
      - --cpu
      - "2"
      - --timeout
      - "300"
      - --concurrency
      - "4"
      - --max-instances
      - "3"
      - --min-instances
      - "0"
      - --set-env-vars
      - APP_ENV=production,GEMMA_ONLINE_MODEL=models/gemma-4-26b-a4b-it,FRONTEND_ORIGIN=https://gemma-4-hackathon.vercel.app,CHROMA_PATH=/tmp/chroma,RAG_VISUAL_ASSETS_PATH=/tmp/page_images,DB_PATH=/tmp/imciflow.db,WHISPER_DEVICE=cpu,WHISPER_COMPUTE_TYPE=int8,AUDIO_TEMP_DIR=/tmp/audio_tmp,VIDEO_TEMP_DIR=/tmp/video_tmp,OLLAMA_BASE_URL=http://localhost:11434,GEMMA_OFFLINE_MODEL=gemma3:1b
      - --set-secrets
      - GOOGLE_AI_API_KEY=google-ai-api-key:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_IMAGE}:$BUILD_ID
